<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bevolkingsevolutie in Europa</title>
  <link rel="stylesheet" href="../assets/vendor/maplibre-gl.css">
  <link rel="stylesheet" href="../assets/vendor/nouislider.min.css">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <!-- Map fills the whole viewport (or iframe) -->
  <div id="map"></div>

  <!-- Period slider + mode toggle, top-left, overlayed on the map -->
  <div id="period-buttons" class="map-overlay-element">
    <p id="period-title">Bevolkingsevolutie in Europa</p>
    <div id="year-slider"></div>
    <!-- mode-row is hidden via CSS — code paths for "abs" still work,
         we just don't expose the toggle in the UI. -->
    <div class="mode-row" hidden>
      <label><input type="radio" name="mode" value="pct" checked> % verandering</label>
      <label><input type="radio" name="mode" value="abs"> Δ bevolking</label>
    </div>
  </div>

  <!-- Click popup with the trend chart, bottom-left -->
  <div id="chart-panel-wrapper">
    <div id="chart-panel" class="map-overlay-element" style="display: none;">
      <div id="data-popup">
        <a id="close-button">×</a>
        <p class="info-sentence" id="info-sentence"></p>
        <div id="popup_chart"></div>
      </div>
    </div>
  </div>

  <!-- Legend + attribution, bottom-right -->
  <div id="map-legend-wrapper">
    <div class="map-overlay-element">
      <div id="map_legend"></div>
      <div id="map-footer">
        Data:
        <a href="https://data.jrc.ec.europa.eu/dataset/37fcacbf-12e2-4b31-b1af-83117a74b2c7"
           target="_blank" rel="noopener">JRC</a>.
        Kaart:
        <a href="https://protomaps.com" target="_blank" rel="noopener">Protomaps</a>
        /
        <a href="https://openstreetmap.org" target="_blank" rel="noopener">OSM</a>.
      </div>
    </div>
  </div>

  <script src="../assets/vendor/maplibre-gl.js"></script>
  <script src="../assets/vendor/pmtiles.js"></script>
  <script src="../assets/vendor/protomaps-themes-base.js"></script>
  <script src="../assets/vendor/d3.min.js"></script>
  <script src="../assets/vendor/nouislider.min.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
